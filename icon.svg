<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" /> <stop offset="100%" stop-color="#0F172A" /> </linearGradient>
    
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" /> <stop offset="100%" stop-color="#EA580C" /> </linearGradient>
    
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bgGradient)" />
  
  <circle cx="256" cy="256" r="180" fill="url(#glass)" stroke="rgba(255,255,255,0.1)" stroke-width="4" />
  <ellipse cx="256" cy="256" rx="90" ry="180" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" />
  <ellipse cx="256" cy="256" rx="180" ry="90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" />

  <circle cx="256" cy="256" r="45" fill="url(#sunGradient)" />
  
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#sunGradient)" stroke-width="8" stroke-dasharray="10, 63.3" stroke-linecap="round" />

  <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <line x1="256" y1="256" x2="256" y2="170" stroke-width="16" />
    <line x1="256" y1="256" x2="335" y2="256" stroke-width="12" />
    <line x1="256" y1="256" x2="190" y2="322" stroke="#EA580C" stroke-width="6" />
  </g>

  <circle cx="256" cy="256" r="14" fill="#ffffff" />
</svg>
