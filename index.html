<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorldClock">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Multi-timezone world clock with live weather, Persian & Gregorian calendar, and holiday tracking">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>World Clock — Multi-Zone</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --glass-hover: rgba(255,255,255,0.10);
    --text-primary: #f0f0f5;
    --text-secondary: rgba(255,255,255,0.55);
    --text-muted: rgba(255,255,255,0.30);
    --accent-1: #7c5cfc;
    --accent-2: #5ce1e6;
    --accent-3: #f472b6;
    --accent-4: #fbbf24;
    --accent-5: #34d399;
    --radius: 20px;
    --radius-sm: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html {
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a1a;
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Animated gradient blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #7c5cfc, #5c3cdc);
    top: -150px; left: -100px;
    animation: blob1 20s ease-in-out infinite alternate;
  }
  body::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #5ce1e6, #3b82f6);
    bottom: -100px; right: -80px;
    animation: blob2 18s ease-in-out infinite alternate;
  }

  @keyframes blob1 {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(200px, 100px) scale(1.2); }
    100% { transform: translate(50px, 200px) scale(0.9); }
  }
  @keyframes blob2 {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-180px, -80px) scale(1.15); }
    100% { transform: translate(-60px, -150px) scale(0.85); }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: calc(24px + var(--safe-top)) max(24px, var(--safe-left)) calc(40px + var(--safe-bottom)) max(24px, var(--safe-right));
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 8px;
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 4px;
    font-weight: 400;
  }

  /* Install banner */
  .install-banner {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px 20px;
    margin-bottom: 20px;
    border-radius: var(--radius-sm);
    background: rgba(124,92,252,0.12);
    border: 1px solid rgba(124,92,252,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .install-banner.visible { display: flex; }
  .install-banner span {
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .install-btn {
    background: var(--accent-1);
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .install-btn:hover { background: #6a48e6; transform: scale(1.05); }
  .install-dismiss {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 1.1rem;
    line-height: 1;
  }

  /* Grid */
  .clock-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 1100px) { .clock-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 750px) { .clock-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
  @media (max-width: 480px) { .clock-grid { grid-template-columns: 1fr; gap: 14px; } }

  /* Clock card */
  .clock-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 24px 20px 20px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .clock-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
    opacity: 0.7;
  }
  .clock-card:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.18);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  @media (hover: none) {
    .clock-card:hover {
      transform: none;
      box-shadow: none;
    }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .card-flag {
    font-size: 1.5rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .card-flag img {
    width: 1.5rem;
    height: auto;
    border-radius: 3px;
    vertical-align: middle;
  }
  .card-location {
    display: flex;
    flex-direction: column;
  }
  .card-city {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .card-country {
    font-size: 0.72rem;
    color: var(--text-secondary);
    font-weight: 400;
    margin-top: 1px;
  }
  .card-timezone {
    font-size: 0.68rem;
    color: var(--text-muted);
    background: rgba(255,255,255,0.05);
    padding: 2px 8px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
    flex-shrink: 0;
  }

  .card-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 2px;
    color: var(--text-primary);
  }
  .card-time .seconds {
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 400;
    vertical-align: super;
    margin-left: 2px;
  }
  .card-time .ampm {
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-left: 6px;
    letter-spacing: 0.05em;
  }

  .card-date {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 400;
    margin-bottom: 10px;
  }
  .card-day {
    font-size: 0.76rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 8px;
    display: inline-block;
    margin-bottom: 12px;
  }

  /* Persian calendar section */
  .persian-cal {
    margin-bottom: 24px;
    padding: 16px 18px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .persian-cal-title {
    font-size: 0.72rem;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .persian-cal-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .persian-cal-nav button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7);
    border-radius: 6px;
    width: 28px; height: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .persian-cal-nav button:hover {
    background: rgba(255,255,255,0.15);
    color: white;
  }
  .persian-cal-month-label {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }
  .persian-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }
  .persian-day-name {
    font-size: 0.58rem;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    padding: 3px 0;
    text-transform: uppercase;
  }
  .persian-day {
    font-size: 0.68rem;
    padding: 4px 0;
    border-radius: 5px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    transition: all 0.15s;
    min-height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .persian-day:hover {
    background: rgba(255,255,255,0.08);
    color: white;
  }
  .persian-day.today {
    background: rgba(255,255,255,0.15);
    color: white;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .persian-day.other-month {
    color: rgba(255,255,255,0.25);
  }
  .persian-date-display {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
    font-weight: 500;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-family: 'Inter', sans-serif;
    direction: rtl;
    text-align: right;
  }

  /* Weather section */
  .weather-section {
    margin-bottom: 14px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .weather-main {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .weather-icon {
    font-size: 2rem;
    line-height: 1;
  }
  .weather-temp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
  }
  .weather-desc {
    font-size: 0.72rem;
    color: var(--text-secondary);
    text-transform: capitalize;
  }
  .weather-details {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .weather-detail {
    font-size: 0.65rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .weather-detail span {
    color: var(--text-secondary);
  }
  .weather-loading {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-style: italic;
  }
  .weather-error {
    font-size: 0.68rem;
    color: rgba(239,68,68,0.6);
    font-style: italic;
  }

  /* Holiday badges */
  .holidays {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    min-height: 28px;
  }
  .holiday-badge {
    font-size: 0.65rem;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 7px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-secondary);
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .holiday-badge.today {
    background: rgba(124,92,252,0.15);
    border-color: rgba(124,92,252,0.3);
    color: var(--accent-1);
  }
  .holiday-badge.upcoming {
    background: rgba(251,191,36,0.10);
    border-color: rgba(251,191,36,0.2);
    color: var(--accent-4);
  }
  .no-holiday {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Bottom section */
  .bottom-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 800px) { .bottom-section { grid-template-columns: 1fr; } }

  /* Calendar */
  .calendar-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 24px 20px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }
  .calendar-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .calendar-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }
  .calendar-nav button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-secondary);
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 0.9rem;
    -webkit-tap-highlight-color: transparent;
  }
  .calendar-nav button:hover {
    background: rgba(255,255,255,0.12);
    color: var(--text-primary);
  }
  .calendar-month-label {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
    min-width: 130px;
    text-align: center;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    text-align: center;
  }
  .cal-day-name {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--text-muted);
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .cal-day {
    font-size: 0.78rem;
    padding: 8px 0;
    border-radius: 8px;
    cursor: default;
    transition: all 0.15s;
    font-weight: 400;
    color: var(--text-secondary);
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cal-day.today {
    background: var(--accent-1);
    color: white;
    font-weight: 600;
  }
  .cal-day.other-month {
    color: var(--text-muted);
    opacity: 0.4;
  }
  .cal-day.has-holiday {
    border-bottom: 2px solid var(--accent-4);
  }

  /* Upcoming Holidays */
  .holidays-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 24px 20px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }
  .holidays-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .holiday-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .holiday-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    transition: background 0.2s;
  }
  .holiday-item:hover {
    background: rgba(255,255,255,0.06);
  }
  .holiday-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--accent-4);
    min-width: 55px;
    padding-top: 1px;
  }
  .holiday-info {
    flex: 1;
  }
  .holiday-name {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-primary);
  }
  .holiday-location {
    font-size: 0.68rem;
    color: var(--text-secondary);
    margin-top: 1px;
  }
  .holiday-days-left {
    font-size: 0.65rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    padding-top: 1px;
  }

  /* Pulse animation for seconds */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .seconds { animation: pulse 1s ease-in-out infinite; }

  /* Sunrise/sunset bar */
  .sun-bar {
    margin-top: 8px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }
  .sun-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #fbbf24, #f97316);
    transition: width 0.5s;
  }
  .sun-times {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }
  .sun-time {
    font-size: 0.62rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Mobile-specific improvements */
  @media (max-width: 480px) {
    .app {
      padding: calc(16px + var(--safe-top)) max(16px, var(--safe-left)) calc(32px + var(--safe-bottom)) max(16px, var(--safe-right));
    }
    .header { margin-bottom: 20px; }
    .header h1 { font-size: 1.35rem; }
    .header .subtitle { font-size: 0.78rem; }
    .clock-card { padding: 20px 16px 18px; }
    .card-city { font-size: 1rem; }
    .card-country { font-size: 0.75rem; }
    .card-timezone { font-size: 0.65rem; padding: 2px 6px; }
    .card-time { font-size: 2.2rem; }
    .card-time .seconds { font-size: 0.9rem; }
    .card-time .ampm { font-size: 0.78rem; }
    .card-date { font-size: 0.78rem; }
    .card-day { font-size: 0.74rem; padding: 3px 8px; }
    .weather-section { padding: 10px 12px; }
    .weather-icon { font-size: 1.8rem; }
    .weather-temp { font-size: 1.3rem; }
    .weather-detail { font-size: 0.62rem; }
    .persian-cal { padding: 14px 14px; }
    .persian-day { font-size: 0.65rem; min-height: 26px; }
    .calendar-card, .holidays-card { padding: 20px 16px; }
    .calendar-title, .holidays-title { font-size: 0.95rem; }
    .cal-day { font-size: 0.75rem; min-height: 30px; }
    .holiday-item { padding: 8px 10px; gap: 8px; }
    .holiday-name { font-size: 0.78rem; }
    .holiday-date { font-size: 0.72rem; min-width: 50px; }
    .holiday-days-left { font-size: 0.62rem; }
  }

  /* Small phone */
  @media (max-width: 360px) {
    .card-time { font-size: 2rem; }
    .card-city { font-size: 0.92rem; }
    .weather-details { gap: 8px; }
    .weather-detail { font-size: 0.6rem; }
  }

  /* Landscape mobile */
  @media (max-height: 500px) and (orientation: landscape) {
    .app { padding: 12px 16px; }
    .header { margin-bottom: 16px; }
    .header h1 { font-size: 1.2rem; }
    .clock-grid { gap: 10px; margin-bottom: 16px; }
    .clock-card { padding: 14px 12px 12px; }
    .card-time { font-size: 1.8rem; }
    .weather-section { margin-bottom: 8px; padding: 8px 10px; }
    .holidays { min-height: 22px; }
    .bottom-section { gap: 10px; margin-bottom: 16px; }
    .calendar-card, .holidays-card { padding: 16px 14px; }
  }

  /* Large screens */
  @media (min-width: 1600px) {
    .app { max-width: 1600px; }
    .clock-grid { gap: 20px; }
    .card-time { font-size: 3rem; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🌐 World Clock</h1>
    <div class="subtitle">Time · Weather · Calendar · Holidays</div>
  </div>

  <div class="install-banner" id="installBanner">
    <span>Add to Home Screen</span>
    <button class="install-btn" id="installBtn">Install App</button>
    <button class="install-dismiss" id="installDismiss">✕</button>
  </div>

  <div class="clock-grid" id="clockGrid"></div>

  <div class="bottom-section">
    <div class="calendar-card">
      <div class="persian-cal">
        <div class="persian-cal-title">
          📅 تقویم شمسی
          <div class="persian-cal-nav">

// ─── Persian (Solar Hijri) Calendar ───
const PERSIAN_MONTHS = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const PERSIAN_DAYS = ['ش','ی','د','س','چ','پ','ج'];
const PERSIAN_WEEKDAYS = ['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه','شنبه'];
const PERSIAN_DIGITS = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];

function toPersianDigits(num) {
  return String(num).replace(/[0-9]/g, d => PERSIAN_DIGITS[parseInt(d)]);
}

function getPersianDateDisplay(date) {
  const p = gregorianToPersian(date.getFullYear(), date.getMonth() + 1, date.getDate());
  const dayOfWeek = date.getDay();
  return `${PERSIAN_WEEKDAYS[dayOfWeek]} ${toPersianDigits(p.day)} ${PERSIAN_MONTHS[p.month - 1]} ${toPersianDigits(p.year)}`;
}

let persianCalYear, persianCalMonth;

// Jalali calendar conversion (reliable algorithm)
function gregorianToPersian(gy, gm, gd) {
  let g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let gy2 = (gm > 2) ? gy + 1 : gy;
  let days = 355666 + (365 * gy) + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) + gd + g_d_m[gm - 1];
  let jy = -1595 + (33 * Math.floor(days / 12053));
  days %= 12053;
  jy += 4 * Math.floor(days / 1461);
  days %= 1461;
  if (days > 365) {
    jy += Math.floor((days - 1) / 365);
    days = (days - 1) % 365;
  }
  let jm, jd;
  if (days < 186) {
    jm = 1 + Math.floor(days / 31);
    jd = 1 + (days % 31);
  } else {
    jm = 7 + Math.floor((days - 186) / 30);
    jd = 1 + ((days - 186) % 30);
  }
  return { year: jy, month: jm, day: jd };
}

function jalaliToGregorian(jy, jm, jd) {
  let jy2 = jy + 1595;
  let days = -355668 + (365 * jy2) + (Math.floor(jy2 / 33) * 8) + Math.floor(((jy2 % 33) + 3) / 4) + jd + ((jm < 7) ? (jm - 1) * 31 : ((jm - 7) * 30) + 186);
  let gy = 400 * Math.floor(days / 146097);
  days %= 146097;
  if (days > 36524) {
    gy += 100 * Math.floor(--days / 36524);
    days %= 36524;
    if (days >= 365) days++;
  }
  gy += 4 * Math.floor(days / 1461);
  days %= 1461;
  if (days > 365) {
    gy += Math.floor((days - 1) / 365);
    days = (days - 1) % 365;
  }
  let gd = days + 1;
  let sal_a = [0,31,((gy % 4 === 0 && gy % 100 !== 0) || (gy % 400 === 0)) ? 29 : 28,31,30,31,30,31,31,30,31,30,31];
  let gm;
  for (gm = 0; gm < 13 && gd > sal_a[gm]; gm++) gd -= sal_a[gm];
  return new Date(gy, gm - 1, gd);
}

function isJalaliLeap(jy) {
  const breaks = [1,5,9,13,17,22,26,30];
  const cycle = jy % 2820;
  const pos = breaks.indexOf(cycle % 128);
  if (pos !== -1) return true;
  const r = ((jy - 1) % 2820 + 2820) % 2820;
  const jump = Math.floor((r + 38) / 63) * 4 - Math.floor(((r + 38) % 63) / 4);
  return jump === 1;
}

function getJalaliMonthDays(jy, jm) {
  if (jm <= 6) return 31;
  if (jm <= 11) return 30;
  return isJalaliLeap(jy) ? 30 : 29;
}

function getJalaliYearFirstDay(jy) {
  const newYear = jalaliToGregorian(jy, 1, 1);
  return newYear.getDay();
}

let now2 = new Date();
let persianToday = gregorianToPersian(now2.getFullYear(), now2.getMonth() + 1, now2.getDate());
persianCalYear = persianToday.year;

function renderPersianCalendar() {
  const grid = document.getElementById('persianCalendarGrid');
  if (!grid) return;
  
  const label = document.getElementById('persianCalMonthLabel');
  label.textContent = `${PERSIAN_MONTHS[persianCalMonth - 1]} ${persianCalYear}`;
  
  let html = PERSIAN_DAYS.map(d => `<div class="persian-day-name">${d}</div>`).join('');
  
  const firstDayOfWeek = getJalaliYearFirstDay(persianCalYear);
  let monthOffset = 0;
  for (let m = 1; m < persianCalMonth; m++) {
    monthOffset += getJalaliMonthDays(persianCalYear, m);
  }
  monthOffset %= 7;
  
  const firstDay = (firstDayOfWeek + monthOffset) % 7;
  const daysInMonth = getJalaliMonthDays(persianCalYear, persianCalMonth);
  const prevMonth = persianCalMonth === 1 ? 12 : persianCalMonth - 1;
  const prevYear = persianCalMonth === 1 ? persianCalYear - 1 : persianCalYear;
  const daysInPrev = getJalaliMonthDays(prevYear, prevMonth);
  
  const today = gregorianToPersian(now2.getFullYear(), now2.getMonth() + 1, now2.getDate());
  
  for (let i = firstDay; i > 0; i--) {
    html += `<div class="persian-day other-month">${daysInPrev - i + 1}</div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.day && persianCalMonth === today.month && persianCalYear === today.year;
    html += `<div class="persian-day${isToday ? ' today' : ''}">${d}</div>`;
  }
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="persian-day other-month">${i}</div>`;
  }
  
  grid.innerHTML = html;
}

function changePersianMonth(delta) {
  persianCalMonth += delta;
  if (persianCalMonth > 12) { persianCalMonth = 1; persianCalYear++; }
  if (persianCalMonth < 1) { persianCalMonth = 12; persianCalYear--; }
  renderPersianCalendar();
}

// ─── Easter Computus ───
function computeEaster(year) {
  const a = year % 19, b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(year, month, day);
}

function findNthMonday(year, month, n) {
  let count = 0, d = new Date(year, month, 1);
  while (d.getDay() !== 1) d.setDate(d.getDate() + 1);
  d.setDate(d.getDate() + n * 7);
  return d;
}

function findLastMonday(year, month) {
  let d = new Date(year, month + 1, 0);
  while (d.getDay() !== 1) d.setDate(d.getDate() - 1);
  return d;
}

// ─── State ───
let calYear, calMonth;
const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();

// ─── Fetch Weather ───
async function fetchWeather(loc) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,uv_index,is_day&daily=sunrise,sunset&timezone=${encodeURIComponent(loc.tz)}&forecast_days=1`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data;
  } catch (err) {
    console.warn(`Weather fetch failed for ${loc.city}:`, err.message);
    return null;
  }
}

async function fetchAllWeather() {
  const results = await Promise.allSettled(LOCATIONS.map(loc => fetchWeather(loc)));
  results.forEach((result, i) => {
    if (result.status === 'fulfilled' && result.value) {
      window._weatherData = window._weatherData || {};
      window._weatherData[LOCATIONS[i].tz] = result.value;
    }
  });
  updateWeatherInCards();
}

// ─── Render Clocks ───
function renderClocks() {
  const grid = document.getElementById('clockGrid');
  grid.innerHTML = '';

  LOCATIONS.forEach(loc => {
    const timeOpts = { timeZone: loc.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
    const dateOpts = { timeZone: loc.tz, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const tzOpts = { timeZone: loc.tz, timeZoneName: 'short' };

    const timeStr = new Date().toLocaleTimeString('en-US', timeOpts);
    const dateStr = new Date().toLocaleDateString('en-US', dateOpts);
    const tzStr = new Date().toLocaleTimeString('en-US', tzOpts).split(' ').pop();

    const [hours, minutes, seconds] = timeStr.split(/[:\s]/);
    const ampm = timeStr.includes('PM') ? 'PM' : 'AM';

    const card = document.createElement('div');
    card.className = 'clock-card';
    card.style.setProperty('--accent-color', loc.color);
    card.innerHTML = `
      <div class="card-header">
        <span class="card-flag">${loc.flag}</span>
        <div class="card-location">
          <span class="card-city">${loc.city}</span>
          <span class="card-country">${loc.country}</span>
        </div>
        <span class="card-timezone">${tzStr}</span>
      </div>
      <div class="card-time">
        ${hours}:${minutes}<span class="seconds">${seconds}</span><span class="ampm">${ampm}</span>
      </div>
      <div class="card-date">${loc.city === 'Maku' ? getPersianDateDisplay(new Date()) : dateStr}</div>
      <div class="card-day" style="background:${loc.color}22;color:${loc.color};border:1px solid ${loc.color}33;">
        ${new Date().toLocaleDateString('en-US', { timeZone: loc.tz, weekday: 'long' })}
      </div>
      <div class="weather-section" id="weather-${loc.tz}">
        <span class="weather-loading">⏳ Loading weather…</span>
      </div>
      <div class="holidays" id="holidays-${loc.tz}"></div>
    `;
    grid.appendChild(card);
  });

  renderPersianCalendar();
  updatePersianDateDisplay();
  updateHolidaysInCards();
}

function updateClocks() {
  LOCATIONS.forEach(loc => {
    const timeOpts = { timeZone: loc.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
    const [hours, minutes, seconds] = new Date().toLocaleTimeString('en-US', timeOpts).split(/[:\s]/);
    const ampm = new Date().toLocaleTimeString('en-US', timeOpts).includes('PM') ? 'PM' : 'AM';
    const weatherEl = document.querySelector(`[id="weather-${loc.tz}"]`)?.parentElement;
    if (!weatherEl) return;
    const timeEl = weatherEl.querySelector('.card-time');
    const dayEl = weatherEl.querySelector('.card-day');
    const dateEl = weatherEl.querySelector('.card-date');
    if (timeEl) timeEl.innerHTML = `${hours}:${minutes}<span class="seconds">${seconds}</span><span class="ampm">${ampm}</span>`;
    if (dayEl) dayEl.textContent = new Date().toLocaleDateString('en-US', { timeZone: loc.tz, weekday: 'long' });
    if (dateEl) dateEl.textContent = loc.city === 'Maku' ? getPersianDateDisplay(new Date()) : new Date().toLocaleDateString('en-US', { timeZone: loc.tz, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  });
  updateHolidaysInCards();
  updatePersianDateDisplay();
}

function updateWeatherInCards() {
  const weather = window._weatherData;
  if (!weather) return;

  LOCATIONS.forEach(loc => {
    const data = weather[loc.tz];
    if (!data) return;

    const container = document.getElementById(`weather-${loc.tz}`);
    if (!container) return;

    const current = data.current;
    const daily = data.daily;
    const weatherInfo = getWeatherInfo(current.weather_code, current.is_day);

    const windDirs = ['N','NE','E','SE','S','SW','W','NW'];
    const windDir = windDirs[Math.round(current.wind_direction_10m / 45) % 8];

    const sunrise = daily.sunrise[0] ? new Date(daily.sunrise[0]) : null;
    const sunset = daily.sunset[0] ? new Date(daily.sunset[0]) : null;
    const nowMs = Date.now();
    let sunProgress = 50;
    if (sunrise && sunset) {
      const dayLength = sunset - sunrise;
      const elapsed = nowMs - sunrise.getTime();
      sunProgress = Math.max(0, Math.min(100, (elapsed / dayLength) * 100));
    }

    container.innerHTML = `
      <div class="weather-main">
        <span class="weather-icon">${weatherInfo.icon}</span>
        <div>
          <div class="weather-temp">${Math.round(current.temperature_2m)}°C</div>
          <div class="weather-desc">${weatherInfo.desc}</div>
        </div>
      </div>
      <div class="weather-details">
        <span class="weather-detail">Feels like <span>${Math.round(current.apparent_temperature)}°</span></span>
        <span class="weather-detail">Humidity <span>${current.relative_humidity_2m}%</span></span>
        <span class="weather-detail">Wind <span>${Math.round(current.wind_speed_10m)} km/h ${windDir}</span></span>
        <span class="weather-detail">UV <span>${current.uv_index}</span></span>
      </div>
      ${sunrise && sunset ? `
      <div class="sun-bar"><div class="sun-bar-fill" style="width:${sunProgress}%"></div></div>
      <div class="sun-times">
        <span class="sun-time">🌅 ${sunrise.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}</span>
        <span class="sun-time">🌇 ${sunset.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}</span>
      </div>` : ''}
    `;
  });
}

function updateHolidaysInCards() {
  const today = new Date();
  today.setHours(0,0,0,0);

  LOCATIONS.forEach(loc => {
    const container = document.getElementById(`holidays-${loc.tz}`);
    if (!container) return;
    const holidays = getHolidaysForTz(loc.tz);
    const near = holidays.filter(h => {
      const d = new Date(h.date);
      d.setHours(0,0,0,0);
      const diff = Math.abs(d - today);
      return diff < 30 * 86400000;
    });

    if (near.length === 0) {
      container.innerHTML = '<span class="no-holiday">No holidays nearby</span>';
      return;
    }

    container.innerHTML = near.sort((a,b) => a.date - b.date).slice(0, 4).map(h => {
      const d = new Date(h.date);
      d.setHours(0,0,0,0);
      const diff = d - today;
      const isToday = diff === 0;
      const isPast = diff < 0;
      const cls = isToday ? 'today' : (isPast ? '' : 'upcoming');
      return `<span class="holiday-badge ${cls}">${isToday ? '🔴 ' : ''}${isPast ? '⬅️ ' : ''}${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${h.name}</span>`;
    }).join('');
  });
}

// ─── Calendar ───
function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  const label = document.getElementById('calMonthLabel');
  label.textContent = `${new Date(calYear, calMonth).toLocaleString('en-US',{month:'long'})} ${calYear}`;

  const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let html = dayNames.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  const today = new Date();
  const todayDate = today.getDate();
  const todayMonth = today.getMonth();
  const todayYear = today.getFullYear();

  const allHolidays = LOCATIONS.flatMap(loc => getHolidaysForTz(loc.tz));
  const holidayDays = new Set();
  allHolidays.forEach(h => {
    const d = new Date(h.date);
    if (d.getMonth() === calMonth && d.getFullYear() === calYear) {
      holidayDays.add(d.getDate());
    }
  });

  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-day other-month">${daysInPrev - i}</div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === todayDate && calMonth === todayMonth && calYear === todayYear;
    const hasHoliday = holidayDays.has(d);
    html += `<div class="cal-day${isToday ? ' today' : ''}${hasHoliday ? ' has-holiday' : ''}">${d}</div>`;
  }
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-day other-month">${i}</div>`;
  }

  grid.innerHTML = html;
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

// ─── Upcoming Holidays ───
function renderUpcomingHolidays() {
  const list = document.getElementById('holidayList');
  const today = new Date();
  today.setHours(0,0,0,0);

  const allHolidays = LOCATIONS.flatMap(loc => getHolidaysForTz(loc.tz));
  const upcoming = allHolidays
    .filter(h => { const d = new Date(h.date); d.setHours(0,0,0,0); return d >= today; })
    .sort((a,b) => a.date - b.date)
    .slice(0, 8);

  list.innerHTML = upcoming.map(h => {
    const d = new Date(h.date);
    const diff = Math.ceil((d - today) / 86400000);
    return `
      <li class="holiday-item">
        <span class="holiday-date">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
        <div class="holiday-info">
          <div class="holiday-name">${h.name}</div>
          <div class="holiday-location">${h.location}</div>
        </div>
        <span class="holiday-days-left">${diff === 0 ? 'Today!' : diff === 1 ? 'Tomorrow' : `${diff}d left`}</span>
      </li>
    `;
  }).join('');
}

// ─── Init ───
renderClocks();
renderCalendar();
renderUpcomingHolidays();
fetchAllWeather();
setInterval(tick, 1000);
setInterval(fetchAllWeather, 10 * 60 * 1000);
</script>
